<script>
// Generate SVG icon as data URL
var svgIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#080c17"/><rect x="40" y="40" width="432" height="432" rx="80" fill="#0f1729"/><text x="256" y="340" font-size="260" text-anchor="middle" font-family="serif">💰</text></svg>';
var svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgIcon);

// Create PNG icon via canvas for better compatibility
var canvas = document.createElement('canvas');
canvas.width = 512; canvas.height = 512;
var ctx = canvas.getContext('2d');
var img = new Image();
img.onload = function() {
  ctx.drawImage(img, 0, 0, 512, 512);
  var pngUrl = canvas.toDataURL('image/png');
  // Set apple touch icon
  document.getElementById('apple-icon').href = pngUrl;
  // Create and set manifest
  var manifest = {
    name: 'Finance OS',
    short_name: 'Finance OS',
    description: 'Gestione finanze personali',
    start_url: '/',
    display: 'standalone',
    background_color: '#080c17',
    theme_color: '#00e5a0',
    orientation: 'portrait',
    icons: [
      {src: pngUrl, sizes: '192x192', type: 'image/png'},
      {src: pngUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable'}
    ]
  };
  var blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  document.getElementById('manifest-link').href = URL.createObjectURL(blob);
};
img.src = svgUrl;
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;}

input,textarea{background:#090e1c;border:1px solid var(--cardb);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;border-radius:10px;padding:10px 12px;width:100%;outline:none;transition:border 0.2s;-webkit-appearance:none;}

.rl{font-size:13px;color:var(--dim);}

.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;text-align:center;}

.btns{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.addbtn{background:transparent;border:1px dashed var(--accent);color:var(--accent);border-radius:8px;padding:8px;width:100%;font-size:12px;margin-top:6px;}
.delbtn{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;width:34px;height:38px;font-size:16px;flex-shrink:0;padding:0;}
.mhnav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}

.mhname{flex:1;text-align:center;font-weight:700;font-size:20px;}
.aw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

var sb=supabase.createClient(SB_URL,SB_KEY);

var MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

var DEF_SEZ=[
  {nome:'Casa',em:'🏠',voci:['Mutuo/Affitto','Internet','Elettricità','Gas','Acqua','Manutenzione e riparazione']},
  {nome:'Abbonamenti',em:'📱',voci:['Netflix','Google One','Spotify','iCloud']},

  {nome:'Investimenti',em:'📈',voci:[]},
  {nome:'Viaggi',em:'✈️',voci:[]},
];

var S={
  view:'loading',auth:'login',
  user:null,profile:null,
  tab:'mese',
  mk:(function(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');})(),
  mesi:{},err:'',loading:false,
  step:1,
  setup:{membri:[''],conti:[{nome:'Revolut',col:'#60a5fa',main:true},{nome:'Trade Republic',col:'#fbbf24',main:false},{nome:'IsyBank',col:'#a78bfa',main:false}]},
  showP:false,
  dragFrom:null,
};

var fmt=function(n){return (parseFloat(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})+'\u00a0\u20ac';};
var esc=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');};
var el=function(id){return document.getElementById(id);};

// ── BUILD DEFAULT SEZIONI ─────────────────────────────────────────────────
function buildSezioni(profile){
  var membri=profile?profile.membri||[]:[];
  var sezioni=DEF_SEZ.map(function(s){
    var v={};(s.voci||[]).forEach(function(n){v[n]='';});
    return {nome:s.nome,em:s.em,voci:v};
  });
  var ins=sezioni.findIndex(function(s){return s.nome==='Investimenti';});
  if(ins<0)ins=sezioni.length-2;
  membri.forEach(function(m,i){sezioni.splice(ins+i,0,{nome:m,em:'👤',voci:{}});});
  return sezioni;
}

// ── MESE DATA ─────────────────────────────────────────────────────────────
function tplSezioni(key){
  // Inherit sezioni NAMES and ORDER from most recent past month
  // but always use DEFAULT voci (don't copy custom added voci)
  var keys=Object.keys(S.mesi).sort().filter(function(k){return k<key;});
  if(keys.length){
    var last=S.mesi[keys[keys.length-1]];
    if(last&&last.sezioni&&last.sezioni.length){
      // Get default voci map
      var defMap={};
      DEF_SEZ.forEach(function(s){defMap[s.nome]=s.voci||[];});
      return last.sezioni.map(function(s){
        // For default sections: use default voci
        // For custom/member sections: empty voci
        var defVoci=defMap[s.nome]||[];
        var v={};defVoci.forEach(function(n){v[n]='';});
        return {nome:s.nome,em:s.em,voci:v};
      });
    }
  }
  return buildSezioni(S.profile);
}

function getMD(key){
  if(!S.mesi[key])S.mesi[key]={conti:{},sezioni:tplSezioni(key),viaggi:[],note:''};
  var md=S.mesi[key];
  if(!md.conti)md.conti={};
  if(!md.sezioni||!md.sezioni.length)md.sezioni=tplSezioni(key);
  if(!md.viaggi)md.viaggi=[];
  if(md.note===undefined)md.note='';
  return md;
}

// ── CALC ──────────────────────────────────────────────────────────────────
function calcSpese(md){
  var t=0;
  (md.sezioni||[]).forEach(function(s){Object.values(s.voci||{}).forEach(function(v){t+=parseFloat(v)||0;});});
  (md.viaggi||[]).forEach(function(v){t+=parseFloat(v.costo)||0;});
  return t;
}

function calcAll(md){
  if(!S.profile)return{saldo:0,stip:0,prel:0,spese:0,altri:0,pat:0,cpNome:''};
  var conti=S.profile.conti||[];
  var membri=S.profile.membri||[];
  var cp=conti.find(function(c){return c.main||c.principale;})||conti[0];
  if(!cp)return{saldo:0,stip:0,prel:0,spese:0,altri:0,pat:0,cpNome:''};
  var cpn=cp.nome;
  var inizio=parseFloat(md.conti[cpn+'__i'])||0;
  var stip=0;membri.forEach(function(m){stip+=parseFloat(md.conti[cpn+'__s__'+m])||0;});
  stip+=parseFloat(md.conti[cpn+'__ae'])||0;
  var prel=0;membri.forEach(function(m){prel+=parseFloat(md.conti[cpn+'__p__'+m])||0;});
  var spese=calcSpese(md);
  var saldo=inizio+stip-prel-spese;
  var altri=0;conti.forEach(function(c){if(!(c.main||c.principale)&&c.nome!==cpn){altri+=parseFloat(md.conti[c.nome])||0;}});
  return{saldo:saldo,stip:stip,prel:prel,spese:spese,altri:altri,pat:saldo+altri,cpNome:cpn};
}

// ── LIVE UPDATE ───────────────────────────────────────────────────────────
function lu(){
  var md=getMD(S.mk);
  var r=calcAll(md);
  function sv(id,txt,col){var n=el(id);if(!n)return;n.textContent=txt;if(col)n.style.color=col;}
  sv('lu0',fmt(r.pat),r.pat>=0?'var(--accent)':'var(--red)');
  sv('lu1',fmt(r.spese));
  sv('lu2',fmt(r.saldo),r.saldo>=0?'var(--accent)':'var(--red)');
  sv('lu3','+ '+fmt(r.stip));
  sv('lu4','- '+fmt(r.prel));
  sv('lu5','- '+fmt(r.spese));
  sv('lu6',fmt(r.pat));
  (md.sezioni||[]).forEach(function(s,i){
    var tot=Object.values(s.voci||{}).reduce(function(a,v){return a+(parseFloat(v)||0);},0);
    var n=el('ct'+i);if(n){n.textContent=fmt(tot);n.style.color=tot>0?'var(--gold)':'var(--muted)';}
  });
  var tv=(md.viaggi||[]).reduce(function(a,v){return a+(parseFloat(v.costo)||0);},0);
  sv('ctv',fmt(tv));
}

// ── SUPABASE ──────────────────────────────────────────────────────────────
function fix(d){
  if(!d)d={};
  if(!d.conti)d.conti={};
  if(!d.viaggi)d.viaggi=[];
  if(d.note===undefined)d.note='';
  if(!d.sezioni||!d.sezioni.length)d.sezioni=buildSezioni(S.profile);
  d.sezioni.forEach(function(s){if(!s.voci)s.voci={};});
  return d;
}

async function loadP(){
  var r=await sb.from('profiles').select('*').eq('id',S.user.id).maybeSingle();
  if(!r.data||!r.data.membri||!r.data.membri.length){S.view='setup';S.step=1;render();return;}
  S.profile=r.data;
  if(!(S.profile.conti||[]).some(function(c){return c.main||c.principale;}))
    if(S.profile.conti&&S.profile.conti.length)(S.profile.conti[0].main=true);
  await loadM();
  S.view='app';render();
}

async function loadM(){
  var r=await sb.from('mesi').select('*').eq('user_id',S.user.id);
  S.mesi={};
  (r.data||[]).forEach(function(row){S.mesi[row.mese_key]=fix(row.dati);});
}

var saveT=null;
function save(){
  clearTimeout(saveT);
  saveT=setTimeout(async function(){
    var st=el('ss');if(st)st.textContent='Salvataggio...';
    try{
      await sb.from('mesi').upsert({user_id:S.user.id,mese_key:S.mk,dati:getMD(S.mk),updated_at:new Date().toISOString()},{onConflict:'user_id,mese_key'});
      if(st){st.textContent='Salvato ✓';setTimeout(function(){if(st)st.textContent='☁️ Dati nel cloud';},2000);}
    }catch(e){if(st)st.textContent='Errore!';}
  },800);
}

async function saveP(data){
  await sb.from('profiles').upsert(Object.assign({id:S.user.id},data));
  S.profile=Object.assign({},S.profile,data);
}

// ── MUTATORS (usano data-* per evitare stringhe in onclick) ───────────────
// Tutti i mutatori leggono dati da dataset, mai da parametri stringa negli attributi HTML

function setC(el_){
  var md=getMD(S.mk);
  md.conti[el_.dataset.key]=el_.value;
  lu();save();
}

function setV(el_){
  var md=getMD(S.mk);
  var i=parseInt(el_.dataset.i);
  var v=el_.dataset.v;
  if(!md.sezioni[i].voci)md.sezioni[i].voci={};
  md.sezioni[i].voci[v]=el_.value;
  lu();save();
}

function renV(el_){
  var md=getMD(S.mk);
  var i=parseInt(el_.dataset.i);
  var oldN=el_.dataset.v;
  var newN=el_.value.trim();
  if(!newN||newN===oldN)return;
  var voci=md.sezioni[i].voci;
  if(voci[newN]!==undefined){el_.value=oldN;return;}
  var val=voci[oldN];
  delete voci[oldN];
  voci[newN]=val||'';
  el_.dataset.v=newN;
  // update sibling number input
  var sib=el_.parentNode.querySelector('input[type=number]');
  if(sib)sib.dataset.v=newN;
  // update del button
  var btn=el_.parentNode.querySelector('button');
  if(btn)btn.dataset.v=newN;
  save();
}

function delV(el_){
  var md=getMD(S.mk);
  var i=parseInt(el_.dataset.i);
  var v=el_.dataset.v;
  delete md.sezioni[i].voci[v];
  lu();save();
  var row=el_.closest('.row3');
  if(row)row.remove();
}

function addV(el_){
  var md=getMD(S.mk);
  var i=parseInt(el_.dataset.i);
  var sez=md.sezioni[i];
  if(!sez.voci)sez.voci={};
  var n='Voce '+(Object.keys(sez.voci).length+1);
  sez.voci[n]='';
  save();
  var cont=el('vc'+i);
  if(!cont){reloadContent();return;}
  var scr=el('content').scrollTop;
  var div=document.createElement('div');
  div.className='row3';
  var inp1=document.createElement('input');
  inp1.value=n;inp1.placeholder='Nome voce';
  inp1.dataset.i=i;inp1.dataset.v=n;
  inp1.style.cssText='text-align:left;font-size:13px;color:var(--dim);';
  inp1.addEventListener('blur',function(){renV(this);});
  var inp2=document.createElement('input');
  inp2.type='number';inp2.placeholder='0';
  inp2.dataset.i=i;inp2.dataset.v=n;
  inp2.addEventListener('input',function(){setV(this);});
  var btn=document.createElement('button');
  btn.className='delbtn';btn.textContent='×';
  btn.dataset.i=i;btn.dataset.v=n;
  btn.addEventListener('click',function(){delV(this);});
  div.appendChild(inp1);div.appendChild(inp2);div.appendChild(btn);
  cont.appendChild(div);
  el('content').scrollTop=scr;
  inp1.focus();
}


// ── PROPAGATE TO FUTURE MONTHS ────────────────────────────────────────────
// When sezioni structure changes in current month, apply to all future months
// (future = months after S.mk that exist in S.mesi)
// We copy the structure (names, order, emojis) but preserve their existing values
function propagateFuture(){
  var md=getMD(S.mk);
  var futureKeys=Object.keys(S.mesi).filter(function(k){return k>S.mk;}).sort();
  futureKeys.forEach(function(k){
    var future=S.mesi[k];
    if(!future)return;
    // Build new sezioni matching current month's structure
    // Get default voci map
    var defMap={};DEF_SEZ.forEach(function(s){defMap[s.nome]=s.voci||[];});
    var newSez=md.sezioni.map(function(s){
      // Find existing section in future month to preserve its VALUES
      var existing=future.sezioni?future.sezioni.find(function(fs){return fs.nome===s.nome;}):null;
      // Use default voci names (not custom ones from current month)
      var defVoci=defMap[s.nome]||[];
      var voci={};
      defVoci.forEach(function(v){
        // Preserve existing value if present
        voci[v]=(existing&&existing.voci&&existing.voci[v]!==undefined)?existing.voci[v]:'';
      });
      return{nome:s.nome,em:s.em,voci:voci};
    });
    future.sezioni=newSez;
    // Save future month to Supabase
    sb.from('mesi').upsert({user_id:S.user.id,mese_key:k,dati:future,updated_at:new Date().toISOString()},{onConflict:'user_id,mese_key'}).then(function(){});
  });
}

function delS(el_){
  var md=getMD(S.mk);
  var i=parseInt(el_.dataset.i);
  md.sezioni.splice(i,1);
  propagateFuture();
  save();reloadContent();
}

function addS(){
  var inp=el('nsi');
  if(!inp||!inp.value.trim())return;
  var nome=inp.value.trim();
  var md=getMD(S.mk);
  if(md.sezioni.some(function(s){return s.nome.toLowerCase()===nome.toLowerCase();})){
    inp.style.borderColor='var(--red)';
    setTimeout(function(){inp.style.borderColor='';},1500);
    return;
  }
  md.sezioni.push({nome:nome,em:'📌',voci:{}});
  inp.value='';
  propagateFuture();
  propagateFuture();
  save();reloadContent();
}

function moveSez(from,to){
  if(from===to||to<0)return;
  var md=getMD(S.mk);
  var item=md.sezioni.splice(from,1)[0];
  md.sezioni.splice(to,0,item);
  propagateFuture();
  propagateFuture();
  save();reloadContent();
}

function setVg(el_){
  var md=getMD(S.mk);
  var i=parseInt(el_.dataset.i);
  var f=el_.dataset.f;
  md.viaggi[i][f]=el_.value;
  lu();save();
}

function addVg(){
  var md=getMD(S.mk);
  var i=md.viaggi.length;
  md.viaggi.push({nome:'',costo:''});
  save();
  var cont=el('vgl');
  if(!cont){reloadContent();return;}
  var scr=el('content').scrollTop;
  var div=document.createElement('div');
  div.style.cssText='display:grid;grid-template-columns:1fr 95px 34px;gap:6px;margin-bottom:6px;align-items:center;';
  var inp1=document.createElement('input');
  inp1.placeholder='Destinazione';inp1.dataset.i=i;inp1.dataset.f='nome';
  inp1.style.textAlign='left';
  inp1.addEventListener('blur',function(){setVg(this);});
  var inp2=document.createElement('input');
  inp2.type='number';inp2.placeholder='0';inp2.dataset.i=i;inp2.dataset.f='costo';
  inp2.addEventListener('input',function(){setVg(this);});
  var btn=document.createElement('button');
  btn.className='delbtn';btn.textContent='×';btn.dataset.i=i;
  btn.addEventListener('click',function(){delVg(this);});
  div.appendChild(inp1);div.appendChild(inp2);div.appendChild(btn);
  cont.appendChild(div);
  el('content').scrollTop=scr;
  inp1.focus();
}

function delVg(el_){
  var md=getMD(S.mk);
  md.viaggi.splice(parseInt(el_.dataset.i),1);
  lu();save();reloadContent();
}

function setNote(el_){getMD(S.mk).note=el_.value;save();}

function prevM(){var p=S.mk.split('-');var d=new Date(+p[0],+p[1]-2);S.mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();}
function nextM(){var p=S.mk.split('-');var d=new Date(+p[0],+p[1]);S.mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');render();}

async function logout(){await sb.auth.signOut();S.user=null;S.profile=null;S.mesi={};S.view='auth';S.auth='login';S.err='';render();}

// ── DRAG & DROP ───────────────────────────────────────────────────────────
var dragFrom=null;
function dStart(el_){dragFrom=parseInt(el_.dataset.i);el_.closest('.sc').classList.add('dragging');}
function dEnd(el_){el_.closest('.sc').classList.remove('dragging');document.querySelectorAll('.sc').forEach(function(c){c.classList.remove('drag-over');});}
function dOver(e,el_){e.preventDefault();var to=parseInt(el_.dataset.i);document.querySelectorAll('.sc').forEach(function(c,i){c.classList.toggle('drag-over',i===to);});}
function dDrop(e,el_){e.preventDefault();var to=parseInt(el_.dataset.i);document.querySelectorAll('.sc').forEach(function(c){c.classList.remove('drag-over');});if(dragFrom!==null&&dragFrom!==to)moveSez(dragFrom,to);dragFrom=null;}

  var cont=el('content');

  var scr=cont.scrollTop;
  cont.innerHTML=renderMese();
  cont.scrollTop=scr;
  attachListeners();
}

  var isL=S.auth==='login';
  var d=document.createElement('div');d.className='aw';
  d.innerHTML='<div class="ac">'
    +'<div style="text-align:center;margin-bottom:24px">'
    +'<div style="width:72px;height:72px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 12px">💰</div>'
    +'<div style="font-weight:700;font-size:24px">Finance OS</div>'
    +'<div style="font-size:14px;color:var(--dim);margin-top:4px">'+(isL?'Accedi':'Crea account')+'</div>'
    +'</div>'
    +'<div class="fg"><label class="fl">Email</label><input type="email" id="ae" placeholder="email@esempio.com" autocomplete="email"></div>'
    +'<div class="fg"><label class="fl">Password</label><input type="password" id="ap" placeholder="••••••••" autocomplete="'+(isL?'current-password':'new-password')+'"></div>'
    +(S.err?'<div class="fe">'+esc(S.err)+'</div>':'')
    +'<button id="ab" class="btn btnp" style="margin-top:8px">'+(S.loading?'...':isL?'Accedi':'Registrati')+'</button>'
    +'<div class="asw">'+(isL?'Non hai un account? <a id="asw">Registrati</a>':'Hai già un account? <a id="asw">Accedi</a>')+'</div>'
    +'</div>';
  el('root').innerHTML='';el('root').appendChild(d);
  el('ab').onclick=function(){doAuth();};
  el('ae').onkeydown=function(e){if(e.keyCode===13)doAuth();};
  el('ap').onkeydown=function(e){if(e.keyCode===13)doAuth();};
  el('asw').onclick=function(){S.auth=isL?'register':'login';S.err='';render();};
}

async function doAuth(){
  var em=el('ae').value.trim(),pw=el('ap').value;
  if(!em||!pw){S.err='Inserisci email e password';render();return;}
  S.loading=true;S.err='';render();
  var r=S.auth==='login'?await sb.auth.signInWithPassword({email:em,password:pw}):await sb.auth.signUp({email:em,password:pw});
  S.loading=false;
  if(r.error){S.err=r.error.message;render();return;}
  S.user=r.data.user;await loadP();
}

// ── SETUP ─────────────────────────────────────────────────────────────────
function renderSetup(){
  var s=S.setup,step=S.step;
  var d=document.createElement('div');d.className='sw';
  var h='<div style="text-align:center">'
    +'<div style="width:64px;height:64px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px">💰</div>'
    +'<div style="font-weight:700;font-size:20px">'+(S.showP?'Modifica Profilo':'Configura il profilo')+'</div>'
    +'<div style="font-size:13px;color:var(--dim);margin-top:4px">Step '+step+' di 2</div></div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +'<div class="sd'+(step>=1?' on':'')+'"></div>'
    +'<div class="sd'+(step>=2?' on':'')+'"></div></div>';

  if(step===1){
    h+='<div class="card"><div class="ct">👥 Chi usa questo account?</div>';
    s.membri.forEach(function(m,i){
      h+='<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'
        +'<input value="'+esc(m)+'" placeholder="Es: Andrea" id="sm'+i+'" style="flex:1">'
        +(s.membri.length>1?'<button class="delbtn" id="rmm'+i+'">×</button>':'')
        +'</div>';
    });
    h+='<button id="addm" class="addbtn">+ Aggiungi persona</button></div>';
    h+='<button id="snext" class="btn btnp">Continua →</button>';
  }else{
    h+='<div class="card"><div class="ct">🏦 I tuoi conti</div>'
      +'<div style="font-size:12px;color:var(--dim);margin-bottom:12px">⭐ = conto principale (saldo calcolato automaticamente)</div>';
    s.conti.forEach(function(c,i){
      h+='<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'
        +'<button id="sp'+i+'" style="background:transparent;font-size:20px;padding:0;width:28px;flex-shrink:0;border:none">'+(c.main?'⭐':'☆')+'</button>'
        +'<input type="color" value="'+esc(c.col)+'" id="cc'+i+'" style="width:36px;height:36px;padding:3px;border-radius:8px;cursor:pointer;flex-shrink:0;border:1px solid var(--cardb)">'
        +'<input value="'+esc(c.nome)+'" placeholder="Nome conto" id="sc'+i+'" style="flex:1">'
        +(s.conti.length>1?'<button class="delbtn" id="rmc'+i+'">×</button>':'')
        +'</div>';
    });
    h+='<button id="addc" class="addbtn">+ Aggiungi conto</button></div>';
    if(S.err)h+='<div class="fe">'+esc(S.err)+'</div>';
    h+='<button id="ssave" class="btn btnp">'+(S.loading?'Salvataggio...':'Salva 🚀')+'</button>';
    h+='<button id="sback" class="btn btns" style="margin-top:8px">← Indietro</button>';
  }
  h+=S.showP?'<button id="scanc" style="background:transparent;color:var(--muted);font-size:13px;text-align:center;padding:8px;border:none">← Annulla</button>'
    :'<button id="sout" style="background:transparent;color:var(--muted);font-size:13px;text-align:center;padding:8px;border:none">Esci</button>';

  d.innerHTML=h;
  el('root').innerHTML='';el('root').appendChild(d);

  // Attach listeners
  s.membri.forEach(function(m,i){
    var inp=el('sm'+i);
    if(inp)inp.onblur=function(){S.setup.membri[i]=this.value;};
    var rm=el('rmm'+i);
    if(rm)rm.onclick=function(){S.setup.membri.splice(i,1);renderSetup();};
  });
  if(el('addm'))el('addm').onclick=function(){S.setup.membri.push('');renderSetup();};
  if(el('snext'))el('snext').onclick=setupNext;

  s.conti.forEach(function(c,i){
    var sp=el('sp'+i);
    if(sp)sp.onclick=function(){S.setup.conti.forEach(function(x,j){x.main=j===i;});renderSetup();};
    var cc=el('cc'+i);
    if(cc)cc.onchange=function(){S.setup.conti[i].col=this.value;};
    var sc=el('sc'+i);
    if(sc)sc.onblur=function(){S.setup.conti[i].nome=this.value;};
    var rm=el('rmc'+i);
    if(rm)rm.onclick=function(){S.setup.conti.splice(i,1);renderSetup();};
  });
  if(el('addc'))el('addc').onclick=function(){S.setup.conti.push({nome:'',col:'#8892aa',main:false});renderSetup();};
  if(el('ssave'))el('ssave').onclick=setupSave;
  if(el('sback'))el('sback').onclick=function(){S.step=1;renderSetup();};
  if(el('scanc'))el('scanc').onclick=function(){S.showP=false;S.view='app';render();};
  if(el('sout'))el('sout').onclick=logout;
}

function setupNext(){
  S.setup.membri.forEach(function(m,i){var inp=el('sm'+i);if(inp)S.setup.membri[i]=inp.value;});
  var m=S.setup.membri.filter(function(x){return x.trim();});
  if(!m.length){alert('Inserisci almeno un nome');return;}
  S.setup.membri=m;S.step=2;renderSetup();
}

async function setupSave(){
  S.setup.conti.forEach(function(c,i){var inp=el('sc'+i);if(inp)S.setup.conti[i].nome=inp.value;});
  var conti=S.setup.conti.filter(function(c){return c.nome.trim();});
  if(!conti.length){S.err='Inserisci almeno un conto';renderSetup();return;}
  if(!conti.some(function(c){return c.main;}))conti[0].main=true;
  S.loading=true;S.err='';renderSetup();
  await saveP({membri:S.setup.membri,conti:conti});
  S.loading=false;
  if(S.showP){S.showP=false;S.view='app';render();}
  else{await loadM();S.view='app';render();}
}

function openProfile(){
  var p=S.profile;
  S.setup={membri:(p.membri||[]).slice(),conti:JSON.parse(JSON.stringify(p.conti||[]))};
  S.step=1;S.showP=true;S.view='setup';render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  if(S.view==='loading'){el('root').innerHTML='<div class="loading"><div class="spinner"></div><div style="color:var(--dim);font-size:14px">Caricamento...</div></div>';return;}
  if(S.view==='auth'){renderAuth();return;}
  if(S.view==='setup'){renderSetup();return;}
  renderApp();
}

// ── RENDER MESE ───────────────────────────────────────────────────────────
function renderMese(){
  var pp=S.mk.split('-');
  var nm=MESI[+pp[1]-1]+' '+pp[0];
  var md=getMD(S.mk);
  var p=S.profile,conti=p.conti||[],membri=p.membri||[];
  var cp=conti.find(function(c){return c.main||c.principale;})||conti[0];
  var cpn=cp?cp.nome:'';
  var altri=conti.filter(function(c){return !(c.main||c.principale)&&c.nome!==cpn;});
  var r=calcAll(md);

  var h='';

  // Month nav
  h+='<div class="mhnav">'
    +'<button id="pm">‹</button>'

    +'<div class="stat"><div class="sl">💎 Patrimonio</div><div class="sv" id="lu0" style="color:'+(r.pat>=0?'var(--accent)':'var(--red)')+'">'+fmt(r.pat)+'</div></div>'

    h+='<div class="card glow">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'

    });

      +'<input type="number" id="cae" value="'+esc(md.conti[cpn+'__ae']||'')+'" placeholder="0"></div>';
    membri.forEach(function(m){

      +'<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--dim)">Spese</span><span class="mono" style="font-size:13px;color:var(--red)" id="lu5">- '+fmt(r.spese)+'</span></div>'

        +'</div>';
    });
    h+='</div>'
      +'<button id="av'+i+'" class="addbtn">+ Aggiungi voce</button>'

    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'

  h+='</div><button id="addvg" class="addbtn">+ Aggiungi viaggio</button></div>';

  // Note
  h+='<div class="card"><div class="ct">📝 Note</div>'
    +'<textarea id="note" rows="3" placeholder="Annotazioni..." style="resize:none">'+esc(md.note||'')+'</textarea></div>';
  h+='<div id="ss" style="text-align:center;color:var(--muted);font-size:12px;padding:8px 0 16px">☁️ Dati nel cloud</div>';

  return h;
}

// ── ATTACH MESE LISTENERS ─────────────────────────────────────────────────
function attachMeseListeners(){
  var md=getMD(S.mk);
  var p=S.profile,conti=p.conti||[],membri=p.membri||[];
  var cp=conti.find(function(c){return c.main||c.principale;})||conti[0];
  var cpn=cp?cp.nome:'';
  var altri=conti.filter(function(c){return !(c.main||c.principale)&&c.nome!==cpn;});

  // Month nav
  if(el('pm'))el('pm').onclick=prevM;
  if(el('nm_'))el('nm_').onclick=nextM;

  // Conto principale inputs
  if(el('ci'))el('ci').oninput=function(){
    md.conti[cpn+'__i']=this.value;lu();save();
  };
  if(el('cae'))el('cae').oninput=function(){
    md.conti[cpn+'__ae']=this.value;lu();save();
  };
  membri.forEach(function(m){
    var es=el('cs__'+m);
    if(es)es.oninput=function(){md.conti[cpn+'__s__'+m]=this.value;lu();save();};
    var ep=el('cp__'+m);
    if(ep)ep.oninput=function(){md.conti[cpn+'__p__'+m]=this.value;lu();save();};
  });

  // Altri conti
  altri.forEach(function(c){
    var cn=c.nome;
    var ea=el('ca__'+cn);
    if(ea)ea.oninput=function(){md.conti[cn]=this.value;lu();save();};
  });

  // Sezioni
  md.sezioni.forEach(function(sez,i){
    // Drag handle
    var dh=el('dh'+i);
    if(dh){
      dh.draggable=true;
      dh.ondragstart=function(){dStart(this);};
      dh.ondragend=function(){dEnd(this);};
    }
    var sc=el('sez'+i);
    if(sc){
      sc.dataset.i=i;
      sc.ondragover=function(e){dOver(e,this);};
      sc.ondrop=function(e){dDrop(e,this);};
    }
    // Delete section
    var ds=el('ds'+i);
    if(ds){ds.dataset.i=i;ds.onclick=function(){delS(this);};}
    // Add voce
    var av=el('av'+i);
    if(av){av.dataset.i=i;av.onclick=function(){addV(this);};}
    // Voce inputs
    Object.keys(sez.voci||{}).forEach(function(v){
      var vn=el('vn'+i+'_'+v);
      if(vn){vn.dataset.i=i;vn.dataset.v=v;vn.onblur=function(){renV(this);};}
      var vv=el('vv'+i+'_'+v);
      if(vv){vv.dataset.i=i;vv.dataset.v=v;vv.oninput=function(){setV(this);};}
      var vd=el('vd'+i+'_'+v);
      if(vd){vd.dataset.i=i;vd.dataset.v=v;vd.onclick=function(){delV(this);};}
    });
  });

  // Add section
  if(el('nsb'))el('nsb').onclick=addS;
  if(el('nsi'))el('nsi').onkeydown=function(e){if(e.keyCode===13)addS();};

  // Viaggi
  md.viaggi.forEach(function(v,i){
    var vgn=el('vgn'+i);
    if(vgn){vgn.dataset.i=i;vgn.dataset.f='nome';vgn.onblur=function(){setVg(this);};}
    var vgc=el('vgc'+i);
    if(vgc){vgc.dataset.i=i;vgc.dataset.f='costo';vgc.oninput=function(){setVg(this);};}
    var vgd=el('vgd'+i);
    if(vgd){vgd.dataset.i=i;vgd.onclick=function(){delVg(this);};}
  });
  if(el('addvg'))el('addvg').onclick=addVg;

  // Note
  if(el('note'))el('note').onblur=function(){setNote(this);};
}

// ── RENDER STORICO ────────────────────────────────────────────────────────
function renderStorico(){
  var allEntries=Object.keys(S.mesi).sort().reverse().map(function(k){return{key:k,md:S.mesi[k]};});
  // Hide months where patrimonio is 0 and no data entered
  var entries=allEntries.filter(function(e){
    var r=calcAll(e.md);
    var hasConti=Object.values(e.md.conti||{}).some(function(v){return parseFloat(v)!==0&&v!=='';});
    var hasSpese=e.md.sezioni&&e.md.sezioni.some(function(s){return Object.values(s.voci||{}).some(function(v){return parseFloat(v)!==0&&v!=='';});});
    var hasViaggi=e.md.viaggi&&e.md.viaggi.some(function(v){return parseFloat(v.costo)!==0;});
    return hasConti||hasSpese||hasViaggi;
  });
  var h='';
  if(!entries.length)return'<div style="text-align:center;padding:60px;color:var(--muted)">Nessun dato.<br>Inizia dal tab Mese!</div>';

  var cd=entries.slice().reverse().map(function(e){var r=calcAll(e.md);return{key:e.key,tot:r.pat};});
  if(cd.length>1){
    var mv=Math.max.apply(null,cd.map(function(d){return Math.abs(d.tot);}).concat([1]));
    h+='<div class="card"><div class="ct">📊 Andamento Patrimonio</div><div class="bc">';
    cd.forEach(function(d,i){
      var hp=Math.max((Math.abs(d.tot)/mv)*70,4);
      var pp=d.key.split('-');
      h+='<div class="bco">'
        +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:8px;color:var(--dim);text-align:center">'+(d.tot>0?Math.round(d.tot/1000)+'k':'')+'</div>'
        +'<div class="br" style="height:'+hp+'px;background:'+(i===cd.length-1?'var(--accent)':'var(--accentd)')+'"></div>'
        +'<div class="bl">'+String(pp[1]).padStart(2,'0')+'/'+pp[0].slice(2)+'</div>'
        +'</div>';
    });
    h+='</div></div>';
  }

  entries.forEach(function(e){
    var r=calcAll(e.md);
    var pp=e.key.split('-');
    h+='<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<div style="font-weight:700;font-size:16px">'+MESI[+pp[1]-1]+' '+pp[0]+'</div>'
      +'<div class="mono" style="color:'+(r.pat>=0?'var(--accent)':'var(--red)')+';font-size:14px;font-weight:600">'+fmt(r.pat)+'</div>'
      +'</div>'
      +'<div class="stat-row">'
      +'<div class="stat"><div class="sl">Spese</div><div class="sv" style="color:var(--red)">'+fmt(r.spese)+'</div></div>'
      +'<div class="stat"><div class="sl">Patrimonio</div><div class="sv" style="color:var(--accent)">'+fmt(r.pat)+'</div></div>'
      +'</div></div>';
  });
  return h;
}

// ── OVERRIDE renderApp to attach listeners after render ───────────────────
var _origRenderApp=renderApp;
renderApp=function(){
  _origRenderApp();
  attachMeseListeners();
};

// Override reloadContent too
reloadContent=function(){
  var cont=el('content');
  if(!cont){render();return;}
  var scr=cont.scrollTop;
  cont.innerHTML=renderMese();
  attachMeseListeners();
  cont.scrollTop=scr;
};

// ── INIT ──────────────────────────────────────────────────────────────────
async function init(){
  render();
  try{
    var r=await sb.auth.getSession();
    var u=r.data&&r.data.session&&r.data.session.user;
    if(u){S.user=u;await loadP();}
    else{S.view='auth';render();}
  }catch(e){
    console.error(e);
    el('root').innerHTML='<div class="loading"><div style="color:var(--red);font-size:14px;text-align:center;padding:20px">Errore: '+esc(e.message)+'<br><br><button id="rl" style="background:var(--accent);color:#000;padding:10px 20px;border-radius:8px;border:none;font-weight:700">Ricarica</button></div></div>';
    if(el('rl'))el('rl').onclick=function(){location.reload();};
  }
}
init();
</script>
