<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c17">
<title>Finance OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg: #080c17; --card: #0f1729; --cardb: #1a2540;
  --accent: #00e5a0; --accentd: #004d35; --accentg: rgba(0,229,160,0.12);
  --gold: #fbbf24; --red: #f87171; --blue: #60a5fa; --purple: #a78bfa;
  --text: #eef2ff; --dim: #8892aa; --muted: #3a4460;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--cardb);border-radius:2px}
.mono{font-family:'JetBrains Mono',monospace;}
input,textarea,select{background:#090e1c;border:1px solid var(--cardb);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;border-radius:10px;padding:12px 14px;width:100%;outline:none;transition:all 0.2s;-webkit-appearance:none;appearance:none;}
input[type=number]{font-family:'JetBrains Mono',monospace;text-align:right;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accentg);}
input::placeholder,textarea::placeholder{color:var(--muted);}
button{cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all 0.15s;border:none;font-size:15px;}
button:active{opacity:0.8;transform:scale(0.97);}
.fade{animation:fade 0.3s ease forwards;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.spin{animation:spin 0.8s linear infinite;}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{background:rgba(8,12,23,0.97);border-bottom:1px solid var(--cardb);padding:12px 16px;flex-shrink:0;backdrop-filter:blur(12px);}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 14px var(--accentg);}
.logo-text{font-weight:700;font-size:18px;letter-spacing:-0.5px;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:0.5px;}
#content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
#nav{display:flex;background:rgba(8,12,23,0.97);border-top:1px solid var(--cardb);flex-shrink:0;backdrop-filter:blur(12px);}
.nav-btn{flex:1;padding:10px 4px 12px;background:transparent;color:var(--dim);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;}
.nav-btn.active{color:var(--accent);}
.nav-btn .nav-icon{font-size:22px;}
.nav-btn .nav-label{font-size:10px;font-weight:600;letter-spacing:0.5px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--cardb);border-radius:14px;padding:16px;margin-bottom:12px;}
.card.glow{border-color:var(--accent);box-shadow:0 0 20px var(--accentg);}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:12px;}

/* STATS */
.stat-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.stat{background:#090e1c;border-radius:10px;padding:12px;border:1px solid var(--cardb);flex:1;min-width:120px;}
.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;}

/* FORM ROWS */
.row{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-bottom:8px;align-items:center;}
.row-label{font-size:13px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.divider{height:1px;background:var(--cardb);margin:10px 0;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--cardb);}

/* BUTTONS */
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;text-align:center;letter-spacing:0.3px;}
.btn-primary{background:var(--accent);color:#000;}
.btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:13px;}
.add-btn{background:transparent;border:1px dashed var(--accent);color:var(--accent);border-radius:8px;padding:8px;width:100%;font-size:12px;margin-top:6px;}
.del-btn{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;width:34px;height:40px;font-size:16px;flex-shrink:0;}
.more-btn{background:transparent;border:1px dashed var(--muted);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.month-nav button{background:var(--card);color:var(--text);padding:10px 18px;border-radius:10px;border:1px solid var(--cardb);font-size:20px;line-height:1;}
.month-name{flex:1;text-align:center;font-weight:700;font-size:20px;}

/* VIAGGI */
.viaggio-row{display:grid;grid-template-columns:1fr 90px 34px;gap:6px;margin-bottom:6px;align-items:center;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--card);border:1px solid var(--cardb);border-radius:18px;padding:28px 24px;width:100%;max-width:400px;}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo .logo-icon{width:56px;height:56px;font-size:26px;margin:0 auto 10px;}
.auth-title{font-size:24px;font-weight:700;text-align:center;}
.auth-sub{font-size:14px;color:var(--dim);text-align:center;margin-top:6px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.form-error{color:var(--red);font-size:13px;margin-top:8px;text-align:center;}
.auth-switch{text-align:center;margin-top:16px;font-size:14px;color:var(--dim);}
.auth-switch a{color:var(--accent);cursor:pointer;font-weight:600;}

/* SETUP */
.setup-wrap{min-height:100vh;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:500px;margin:0 auto;}
.step-indicator{display:flex;gap:8px;justify-content:center;margin-bottom:8px;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.step-dot.active{background:var(--accent);}
.member-chip{display:inline-flex;align-items:center;gap:6px;background:#090e1c;border:1px solid var(--cardb);border-radius:20px;padding:6px 12px;font-size:13px;margin:4px;}
.member-chip button{background:transparent;color:var(--red);font-size:16px;line-height:1;padding:0 0 0 4px;}

/* BAR CHART */
.bar-chart{height:90px;display:flex;align-items:flex-end;gap:4px;padding:0 2px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.4s;}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);text-align:center;}
.bar-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--cardb);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
</style>
</head>
<body>
<div id="root"></div>

<script>
const SUPABASE_URL = 'https://ldpkhtztfxqtiqfqoldx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lOJBbclb4ssQ7mJkhuBOlQ_gA4WINEI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const DEFAULT_CATEGORIE = {
  casa: ["Mutuo/Affitto","Telefono","Elettricità","Gas","Acqua","Manutenzione","Internet","Piatti"],
  abbonamenti: ["Netflix","Google One","Spotify","iCloud"],
  trasporti: ["Auto/Moto","Assicurazione","Benzina","Manutenzione"],
  assicurazione: ["Casa","Salute","Vita"],
  cibo: ["Spesa","Pranzi/Cene fuori"],
  curaPers: ["Visite","Medicine","Prodotti","Vestiti","Palestra"],
  investimenti: ["Trade Republic","IsyBank","Revolut"],
};
const CAT_LABELS = {
  casa:"🏠 Casa", abbonamenti:"📱 Abbonamenti", trasporti:"🚗 Trasporti",
  assicurazione:"🛡️ Assicurazioni", cibo:"🍽️ Cibo", curaPers:"💊 Cura Personale",
  investimenti:"📈 Investimenti"
};

// STATE
let state = {
  view: 'loading', // loading, auth, setup, app
  authMode: 'login',
  user: null,
  profile: null,
  currentTab: 'mese',
  currentMese: (() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; })(),
  meseData: null,
  allMesi: {},
  loading: false,
  error: '',
  setupStep: 1,
  setupData: { membri: [''], conti: [{nome:'Revolut',colore:'#60a5fa'},{nome:'Trade Republic',colore:'#fbbf24'},{nome:'IsyBank',colore:'#a78bfa'}], categorieExtra: {} },
};

const fmt = n => (parseFloat(n)||0).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const fmtSign = n => { const v=parseFloat(n)||0; return (v>=0?"+":"")+v.toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; };

function render() {
  const root = document.getElementById('root');
  if (state.view === 'loading') { root.innerHTML = `<div class="loading"><div class="spinner"></div><div style="color:var(--dim);font-size:14px">Caricamento...</div></div>`; return; }
  if (state.view === 'auth') { root.innerHTML = renderAuth(); return; }
  if (state.view === 'setup') { root.innerHTML = renderSetup(); return; }
  if (state.view === 'app') { root.innerHTML = renderApp(); return; }
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function renderAuth() {
  const isLogin = state.authMode === 'login';
  return `<div class="auth-wrap fade">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="width:72px;height:72px;font-size:40px;margin:0 auto 12px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--accentg);text-align:center;line-height:1">💰</div>
        <div class="auth-title">Finance OS</div>
        <div class="auth-sub">${isLogin ? 'Accedi al tuo account' : 'Crea il tuo account'}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="auth-email" placeholder="la-tua@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="${isLogin?'current-password':'new-password'}">
      </div>
      ${state.error ? `<div class="form-error">${state.error}</div>` : ''}
      <button class="btn btn-primary" style="margin-top:8px" onclick="doAuth()">${state.loading ? '...' : (isLogin ? 'Accedi' : 'Registrati')}</button>
      <div class="auth-switch">
        ${isLogin ? `Non hai un account? <a onclick="switchAuth('register')">Registrati</a>` : `Hai già un account? <a onclick="switchAuth('login')">Accedi</a>`}
      </div>
    </div>
  </div>`;
}

function switchAuth(mode) { state.authMode = mode; state.error = ''; render(); }

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) { state.error = 'Inserisci email e password'; render(); return; }
  state.loading = true; state.error = ''; render();
  let res;
  if (state.authMode === 'login') {
    res = await sb.auth.signInWithPassword({ email, password: pass });
  } else {
    res = await sb.auth.signUp({ email, password: pass });
  }
  state.loading = false;
  if (res.error) { state.error = res.error.message; render(); return; }
  state.user = res.data.user;
  await loadProfile();
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
  if (!data || !data.membri || data.membri.length === 0) {
    state.view = 'setup'; state.setupStep = 1; render(); return;
  }
  state.profile = data;
  await loadAllMesi();
  state.view = 'app'; render();
}

async function loadAllMesi() {
  const { data } = await sb.from('mesi').select('*').eq('user_id', state.user.id);
  state.allMesi = {};
  (data || []).forEach(r => { state.allMesi[r.mese_key] = r.dati; });
}

async function saveMese(key, dati) {
  await sb.from('mesi').upsert({ user_id: state.user.id, mese_key: key, dati, updated_at: new Date().toISOString() }, { onConflict: 'user_id,mese_key' });
  state.allMesi[key] = dati;
}

async function saveProfile(profileData) {
  await sb.from('profiles').upsert({ id: state.user.id, ...profileData });
  state.profile = { ...state.profile, ...profileData };
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function renderSetup() {
  const s = state.setupData;
  const step = state.setupStep;
  return `<div class="setup-wrap fade">
    <div style="text-align:center">
      <div style="width:64px;height:64px;font-size:36px;margin:0 auto 12px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--accentg);text-align:center;line-height:1">💰</div>
      <div style="font-weight:700;font-size:20px">Configura il tuo profilo</div>
      <div style="font-size:13px;color:var(--dim);margin-top:4px">Step ${step} di 2</div>
    </div>
    <div class="step-indicator">
      <div class="step-dot ${step>=1?'active':''}"></div>
      <div class="step-dot ${step>=2?'active':''}"></div>
    </div>

    ${step === 1 ? `
    <div class="card">
      <div class="card-title">👥 Chi usa questo account?</div>
      <div style="font-size:13px;color:var(--dim);margin-bottom:14px">Inserisci i nomi delle persone che condividono l'account</div>
      <div id="membri-list">
        ${s.membri.map((m,i) => `
          <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
            <input value="${m}" placeholder="Es: Andrea" id="membro-${i}" onblur="updateMembro(${i},this.value)" style="flex:1">
            ${s.membri.length > 1 ? `<button class="del-btn" onclick="removeMembro(${i})">×</button>` : ''}
          </div>`).join('')}
      </div>
      <button class="add-btn" onclick="addMembro()">+ Aggiungi persona</button>
    </div>
    <button class="btn btn-primary" onclick="setupNext()">Continua →</button>
    ` : `
    <div class="card">
      <div class="card-title">🏦 I tuoi conti</div>
      <div style="font-size:13px;color:var(--dim);margin-bottom:14px">Quali conti vuoi monitorare?</div>
      <div id="conti-list">
      <div style="font-size:12px;color:var(--dim);margin-bottom:10px">⭐ Tocca la stella per impostare il conto principale (quello da cui si calcolano le spese)</div>
        ${s.conti.map((c,i) => `
          <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
            <button onclick="setPrincipale(${i})" style="background:transparent;font-size:20px;padding:0;width:32px;flex-shrink:0;border:none">${c.principale ? '⭐' : '☆'}</button>
            <input type="color" value="${c.colore}" onchange="updateConto(${i},'colore',this.value)" style="width:36px;height:36px;padding:3px;border-radius:8px;cursor:pointer;flex-shrink:0">
            <input value="${c.nome}" placeholder="Nome conto" oninput="updateConto(${i},'nome',this.value)" style="flex:1">
            ${s.conti.length > 1 ? `<button class="del-btn" onclick="removeConto(${i})">×</button>` : ''}
          </div>`).join('')}
      </div>
      <button class="add-btn" onclick="addConto()">+ Aggiungi conto</button>
    </div>
    ${state.error ? `<div class="form-error">${state.error}</div>` : ''}
    <button class="btn btn-primary" onclick="setupSave()">${state.loading ? 'Salvataggio...' : 'Inizia! 🚀'}</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="state.setupStep=1;render()">← Indietro</button>
    `}
    <button onclick="doLogout()" style="background:transparent;color:var(--muted);font-size:13px;text-align:center;padding:8px">Esci</button>
  </div>`;
}

function updateMembro(i,v){state.setupData.membri[i]=v;render();}
function addMembro(){state.setupData.membri.push('');render();}
function removeMembro(i){state.setupData.membri.splice(i,1);render();}
function updateConto(i,field,v){state.setupData.conti[i][field]=v;render();}
function addConto(){state.setupData.conti.push({nome:'',colore:'#8892aa',principale:false});render();}
function setPrincipale(i){state.setupData.conti.forEach((c,idx)=>{c.principale=idx===i;});render();}
function removeConto(i){state.setupData.conti.splice(i,1);render();}

function setupNext() {
  const membri = state.setupData.membri.filter(m=>m.trim());
  if (!membri.length) { alert('Inserisci almeno un nome'); return; }
  state.setupData.membri = membri;
  state.setupStep = 2; render();
}

async function setupSave() {
  const conti = state.setupData.conti.filter(c=>c.nome.trim());
  if (!conti.length) { state.error = 'Inserisci almeno un conto'; render(); return; }
  // Ensure exactly one principale
  const hasPrincipale = conti.some(c => c.principale);
  if (!hasPrincipale) conti[0].principale = true;
  state.loading = true; state.error = ''; render();
  // Build categorie per membro
  const categoriePersonali = {};
  state.setupData.membri.forEach(m => { categoriePersonali[m] = []; });
  const categorieFinali = { ...DEFAULT_CATEGORIE, ...categoriePersonali };
  await saveProfile({ membri: state.setupData.membri, conti, categorie: categorieFinali });
  state.loading = false;
  await loadAllMesi();
  state.view = 'app'; render();
}

// ── APP ───────────────────────────────────────────────────────────────────────
function renderApp() {
  const profile = state.profile;
  const membri = profile.membri || [];
  const nomi = membri.join(' & ');
  return `<div id="app">
    <div id="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">💰</div>
          <div><div class="logo-text">Finance OS</div><div class="logo-sub">${nomi}</div></div>
        </div>
        <button onclick="doLogout()" style="background:transparent;color:var(--muted);font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--cardb)">Esci</button>
      </div>
    </div>
    <div id="content" style="flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch">
      ${state.currentTab === 'mese' ? renderMese() : renderStorico()}
    </div>
    <div id="nav" style="display:flex;background:rgba(8,12,23,0.97);border-top:1px solid var(--cardb);flex-shrink:0;backdrop-filter:blur(12px)">
      <button class="nav-btn ${state.currentTab==='mese'?'active':''}" onclick="switchTab('mese')"><span class="nav-icon">📅</span><span class="nav-label">MESE</span></button>
      <button class="nav-btn ${state.currentTab==='storico'?'active':''}" onclick="switchTab('storico')"><span class="nav-icon">📊</span><span class="nav-label">STORICO</span></button>
    </div>
  </div>`;
}

function switchTab(tab) { state.currentTab = tab; render(); }

function getMeseData(key) {
  if (!state.allMesi[key]) {
    const profile = state.profile;
    const spese = {};
    const cats = profile.categorie || DEFAULT_CATEGORIE;
    Object.entries(cats).forEach(([cat,voci]) => { spese[cat]={}; (voci||[]).forEach(v=>{spese[cat][v]="";}); });
    // Spese personali per membro
    (profile.membri||[]).forEach(m => { if(!spese[m])spese[m]={}; });
    const contiChiusura = {};
    (profile.conti||[]).forEach(c => { contiChiusura[c.nome]=""; });
    const entrateObj = { altre: "" };
    (profile.membri||[]).forEach(m => { entrateObj[m]=""; });
    const soldiPresi = {};
    (profile.membri||[]).forEach(m => { soldiPresi[m]=""; });
    state.allMesi[key] = { entrate: entrateObj, soldiPresi, spese, viaggi: [], contiChiusura, note: "" };
  }
  return state.allMesi[key];
}

function sumCat(md,cat){ return Object.values(md.spese[cat]||{}).reduce((s,v)=>s+(parseFloat(v)||0),0); }
function totUscite(md){
  const cats = Object.keys(md.spese||{});
  return cats.reduce((s,c)=>s+sumCat(md,c),0) + (md.viaggi||[]).reduce((s,v)=>s+(parseFloat(v.costo)||0),0);
}
function totEntrate(md){ return Object.values(md.entrate||{}).reduce((s,v)=>s+(parseFloat(v)||0),0); }
function totConti(md, profile) {
  if (!profile) profile = state.profile;
  const conti = profile?.conti || [];
  const contoPrincipale = conti.find(c=>c.principale) || conti[0];
  const tU = totUscite(md);
  let tot = 0;
  conti.forEach(c => {
    if (c.principale) {
      const inizio = parseFloat(md.contiChiusura?.[c.nome+'_inizio'])||0;
      const prelevati = (profile?.membri||[]).reduce((s,m)=>s+(parseFloat(md.contiChiusura?.[c.nome+'_prelevati_'+m])||0),0);
      tot += inizio - prelevati - tU;
    } else {
      tot += parseFloat(md.contiChiusura?.[c.nome])||0;
    }
  });
  return tot;
}

// ── MESE VIEW ─────────────────────────────────────────────────────────────────
function renderMese() {
  const [y,m] = state.currentMese.split("-").map(Number);
  const nomeMese = `${MESI[m-1]} ${y}`;
  const md = getMeseData(state.currentMese);
  const profile = state.profile;
  const membri = profile.membri || [];
  const conti = profile.conti || [];
  const tE = totEntrate(md), tU = totUscite(md), saldo = tE-tU, tC = totConti(md, profile);

  let html = `<div class="fade">`;
  // Month nav
  html += `<div class="month-nav">
    <button onclick="prevMese()">‹</button>
    <div class="month-name">${nomeMese}</div>
    <button onclick="nextMese()">›</button>
  </div>`;
  // Stats
  html += `<div class="stat-row">
    <div class="stat"><div class="stat-label">Entrate</div><div class="stat-value" style="color:var(--accent)">${fmt(tE)}</div></div>
    <div class="stat"><div class="stat-label">Uscite</div><div class="stat-value" style="color:var(--red)">${fmt(tU)}</div></div>
  </div><div class="stat-row">
    <div class="stat"><div class="stat-label">Saldo</div><div class="stat-value" style="color:${saldo>=0?'var(--accent)':'var(--red)'}">${fmtSign(saldo)}</div></div>
    <div class="stat"><div class="stat-label">Patrimonio</div><div class="stat-value" style="color:var(--gold)">${fmt(tC)}</div></div>
  </div>`;

  // Entrate integrated in conto principale

  // Soldi presi now integrated in conto principale section

  // Chiusura conti
  const contoPrincipale = conti.find(c=>c.principale) || conti[0];
  const totPrelevati = (profile.membri||[]).reduce((s,m)=>s+(parseFloat(md.contiChiusura?.[contoPrincipale?.nome+'_prelevati_'+m])||0),0);
  const saldoContoP = (parseFloat(md.contiChiusura?.[contoPrincipale?.nome+'_inizio'])||0) - totPrelevati - tU;

  html += `<div class="card glow"><div class="card-title">🏦 Conti</div>`;

  // Conto principale
  html += `<div style="background:#090e1c;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid ${contoPrincipale?.colore||'var(--accent)'}">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <div style="width:10px;height:10px;border-radius:50%;background:${contoPrincipale?.colore||'var(--accent)'}"></div>
      <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px">⭐ ${contoPrincipale?.nome||'Conto principale'}</div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="row-label">💰 Cifra inizio mese</div>
      <input type="number" value="${md.contiChiusura?.[contoPrincipale?.nome+'_inizio']||''}" placeholder="0" oninput="setConto('${contoPrincipale?.nome}_inizio',this.value)">
    </div>
    ${membri.map(m => `
    <div class="row" style="margin-bottom:10px">
      <div class="row-label">💸 Prelevati ${m}</div>
      <input type="number" value="${md.contiChiusura?.[contoPrincipale?.nome+'_prelevati_'+m]||''}" placeholder="0" oninput="setConto('${contoPrincipale?.nome}_prelevati_${m}',this.value)">
    </div>`).join('')}
    <div style="height:1px;background:var(--cardb);margin:8px 0"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;color:var(--dim)">Spese totali</span>
      <span class="mono" style="font-size:13px;color:var(--red)">- ${fmt(tU)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:700">Saldo stimato</span>
      <span class="mono" style="font-size:16px;font-weight:700;color:${saldoContoP>=0?'var(--accent)':'var(--red)'}">${fmt(saldoContoP)}</span>
    </div>
  </div>`;

  // Altri conti
  conti.filter(c=>!c.principale).forEach(c => {
    html += `<div style="display:grid;grid-template-columns:auto 1fr 100px;gap:8px;margin-bottom:10px;align-items:center">
      <div style="width:10px;height:10px;border-radius:50%;background:${c.colore};flex-shrink:0"></div>
      <div style="font-size:13px;color:var(--dim)">${c.nome}</div>
      <input type="number" value="${md.contiChiusura?.[c.nome]||''}" placeholder="0" oninput="setConto('${c.nome}',this.value)">
    </div>`;
  });

  html += `<div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--accent);margin-top:4px">
    <span style="font-weight:700;font-size:15px">Patrimonio Totale</span>
    <span class="mono" style="color:var(--accent);font-weight:700;font-size:18px">${fmt(tC)}</span>
  </div></div>`;

  // Categorie standard
  const cats = profile.categorie || DEFAULT_CATEGORIE;
  Object.entries(cats).forEach(([cat, voci]) => {
    if (membri.includes(cat)) return; // skip personali per ora
    const label = CAT_LABELS[cat] || ('📌 ' + cat);
    const catVoci = Object.keys(md.spese?.[cat]||{}).length > (voci||[]).length ? Object.keys(md.spese[cat]) : (voci||[]);
    const tot = catVoci.reduce((s,v)=>s+(parseFloat(md.spese?.[cat]?.[v])||0),0);
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">${label}</div>
        <div class="mono" style="font-size:12px;color:${tot>0?'var(--gold)':'var(--muted)'}">${fmt(tot)}</div>
      </div>`;
    catVoci.forEach(v => {
      html += `<div class="row"><div class="row-label">${v}</div><input type="number" value="${md.spese?.[cat]?.[v]||''}" placeholder="0" oninput="setSpesa('${cat}','${v}',this.value)"></div>`;
    });
    html += `<div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="more-btn" onclick="addVoce('${cat}')">+ voce</button></div></div>`;
  });

  // Spese personali per membro
  membri.forEach(membro => {
    const catVoci = Object.keys(md.spese?.[membro]||{});
    const tot = catVoci.reduce((s,v)=>s+(parseFloat(md.spese?.[membro]?.[v])||0),0);
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">👤 ${membro} — Personale</div>
        <div class="mono" style="font-size:12px;color:${tot>0?'var(--gold)':'var(--muted)'}">${fmt(tot)}</div>
      </div>`;
    catVoci.forEach(v => {
      html += `<div class="row"><div class="row-label">${v}</div><input type="number" value="${md.spese?.[membro]?.[v]||''}" placeholder="0" oninput="setSpesa('${membro}','${v}',this.value)"></div>`;
    });
    html += `<div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="more-btn" onclick="addVoce('${membro}')">+ voce</button></div></div>`;
  });

  // Viaggi
  const totV = (md.viaggi||[]).reduce((s,v)=>s+(parseFloat(v.costo)||0),0);
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin-bottom:0">✈️ Viaggi</div>
      <div class="mono" style="font-size:12px;color:${totV>0?'var(--gold)':'var(--muted)'}">${fmt(totV)}</div>
    </div>`;
  (md.viaggi||[]).forEach((v,i) => {
    html += `<div class="viaggio-row">
      <input value="${v.nome||''}" placeholder="Destinazione" oninput="setViaggio(${i},'nome',this.value)" style="text-align:left;font-family:'Space Grotesk',sans-serif">
      <input type="number" value="${v.costo||''}" placeholder="0" oninput="setViaggio(${i},'costo',this.value)">
      <button class="del-btn" onclick="rmViaggio(${i})">×</button>
    </div>`;
  });
  html += `<button class="add-btn" onclick="addViaggio()">+ Aggiungi viaggio</button></div>`;

  // Note
  html += `<div class="card"><div class="card-title">📝 Note</div>
    <textarea rows="3" placeholder="Annotazioni per questo mese..." oninput="setNote(this.value)" style="resize:none;font-family:'Space Grotesk',sans-serif">${md.note||''}</textarea>
  </div>`;

  // Save indicator
  html += `<div id="save-status" style="text-align:center;color:var(--muted);font-size:12px;padding:8px">I dati vengono salvati automaticamente ☁️</div>`;
  html += `</div>`;
  return html;
}

// ── STORICO ───────────────────────────────────────────────────────────────────
function renderStorico() {
  const entries = Object.entries(state.allMesi).sort((a,b)=>b[0].localeCompare(a[0]));
  let html = `<div class="fade">`;
  if (!entries.length) {
    html += `<div style="text-align:center;padding:60px;color:var(--muted);font-size:15px">Nessun dato ancora.<br>Inizia dal tab Mese!</div>`;
  } else {
    const chartData = entries.slice().reverse().map(([key,md]) => ({key, tot:totConti(md)}));
    if (chartData.length > 1) {
      const maxV = Math.max(...chartData.map(d=>d.tot),1);
      html += `<div class="card"><div class="card-title">📊 Andamento Patrimonio</div><div class="bar-chart">`;
      chartData.forEach(({key,tot},i) => {
        const h = Math.max((tot/maxV)*70,4);
        const isLast = i===chartData.length-1;
        const [y,m] = key.split("-").map(Number);
        html += `<div class="bar-col">
          <div class="bar-val">${tot>0?Math.round(tot/1000)+'k':''}</div>
          <div class="bar" style="height:${h}px;background:${isLast?'var(--accent)':'var(--accentd)'}"></div>
          <div class="bar-lbl">${String(m).padStart(2,'0')}/${String(y).slice(2)}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    entries.forEach(([key,md]) => {
      const tE=totEntrate(md), tU=totUscite(md), saldo=tE-tU, tC=totConti(md, state.profile);
      const [y,m] = key.split("-").map(Number);
      html += `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-weight:700;font-size:16px">${MESI[m-1]} ${y}</div>
          <div class="mono" style="color:${saldo>=0?'var(--accent)':'var(--red)'};font-size:14px;font-weight:600">${fmtSign(saldo)}</div>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Entrate</div><div class="stat-value" style="color:var(--accent)">${fmt(tE)}</div></div>
          <div class="stat"><div class="stat-label">Uscite</div><div class="stat-value" style="color:var(--red)">${fmt(tU)}</div></div>
          <div class="stat"><div class="stat-label">Patrimonio</div><div class="stat-value" style="color:var(--gold)">${fmt(tC)}</div></div>
        </div>
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

// ── MUTATORS ──────────────────────────────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const el = document.getElementById('save-status');
    if (el) el.textContent = 'Salvataggio...';
    await saveMese(state.currentMese, state.allMesi[state.currentMese]);
    if (el) el.textContent = 'Salvato ✓';
    setTimeout(() => { if(el) el.textContent = 'I dati vengono salvati automaticamente ☁️'; }, 2000);
  }, 800);
}

function setVal(section, key, val) { getMeseData(state.currentMese)[section][key]=val; scheduleSave(); }
function setSoldi(key, val) { getMeseData(state.currentMese).soldiPresi[key]=val; scheduleSave(); }
function setConto(key, val) { getMeseData(state.currentMese).contiChiusura[key]=val; scheduleSave(); updateStats(); }
function setNote(val) { getMeseData(state.currentMese).note=val; scheduleSave(); }
function setSpesa(cat,voce,val) {
  const md=getMeseData(state.currentMese);
  if(!md.spese[cat])md.spese[cat]={};
  md.spese[cat][voce]=val;
  scheduleSave(); updateStats();
}
function addVoce(cat) {
  const md=getMeseData(state.currentMese);
  if(!md.spese[cat])md.spese[cat]={};
  const n=`Voce ${Object.keys(md.spese[cat]).length+1}`;
  md.spese[cat][n]="";
  scheduleSave(); render();
}
function addViaggio(){getMeseData(state.currentMese).viaggi.push({nome:"",costo:""});scheduleSave();render();}
function rmViaggio(i){getMeseData(state.currentMese).viaggi.splice(i,1);scheduleSave();render();}
function setViaggio(i,field,val){getMeseData(state.currentMese).viaggi[i][field]=val;scheduleSave();}

function updateStats() {
  // Update just the stat boxes without full re-render
  const md = getMeseData(state.currentMese);
  const tE=totEntrate(md), tU=totUscite(md), saldo=tE-tU, tC=totConti(md, state.profile);
  const stats = document.querySelectorAll('.stat-value');
  if (stats[0]) stats[0].textContent = fmt(tE);
  if (stats[1]) stats[1].textContent = fmt(tU);
  if (stats[2]) { stats[2].textContent = fmtSign(saldo); stats[2].style.color = saldo>=0?'var(--accent)':'var(--red)'; }
  if (stats[3]) stats[3].textContent = fmt(tC);
}

function prevMese(){
  const [y,m]=state.currentMese.split("-").map(Number);
  const d=new Date(y,m-2);
  state.currentMese=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  render();
}
function nextMese(){
  const [y,m]=state.currentMese.split("-").map(Number);
  const d=new Date(y,m);
  state.currentMese=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  render();
}

async function doLogout() {
  await sb.auth.signOut();
  state.user=null; state.profile=null; state.allMesi={};
  state.view='auth'; state.authMode='login'; state.error='';
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  render();
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    state.user = session.user;
    await loadProfile();
  } else {
    state.view = 'auth'; render();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') { state.view='auth'; render(); }
  });
}

init();
</script>

</html>
