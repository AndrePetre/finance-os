<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c17">
<title>Finance OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#080c17;--card:#0f1729;--cardb:#1a2540;
  --accent:#00e5a0;--accentd:#004d35;--accentg:rgba(0,229,160,0.12);
  --gold:#fbbf24;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;
  --text:#eef2ff;--dim:#8892aa;--muted:#3a4460;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--cardb);border-radius:2px}
input,textarea,select{background:#090e1c;border:1px solid var(--cardb);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;border-radius:10px;padding:10px 12px;width:100%;outline:none;transition:border 0.2s;-webkit-appearance:none;}
input[type=number]{font-family:'JetBrains Mono',monospace;text-align:right;}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accentg);}
input::placeholder{color:var(--muted);}
button{cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all 0.15s;border:none;}
button:active{opacity:0.8;transform:scale(0.97);}
.mono{font-family:'JetBrains Mono',monospace;}
.fade{animation:fade 0.3s ease forwards;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{background:rgba(8,12,23,0.97);border-bottom:1px solid var(--cardb);padding:12px 16px;flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
#nav{display:flex;background:rgba(8,12,23,0.97);border-top:1px solid var(--cardb);flex-shrink:0;}
.nav-btn{flex:1;padding:10px 4px 12px;background:transparent;color:var(--dim);border:none;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:22px;}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.5px;}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-weight:700;font-size:18px;}
.logo-sub{font-size:10px;color:var(--muted);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--cardb);border-radius:14px;padding:16px;margin-bottom:12px;}
.card.glow{border-color:var(--accent);box-shadow:0 0 20px var(--accentg);}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:12px;}

/* STATS */
.stat-row{display:flex;gap:8px;margin-bottom:10px;}
.stat{background:#090e1c;border-radius:10px;padding:12px;border:1px solid var(--cardb);flex:1;}
.stat-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;}

/* FORM */
.row{display:grid;grid-template-columns:1fr 105px;gap:8px;margin-bottom:8px;align-items:center;}
.row-label{font-size:13px;color:var(--dim);}
.divider{height:1px;background:var(--cardb);margin:10px 0;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;text-align:center;}
.btn-primary{background:var(--accent);color:#000;}
.btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.add-btn{background:transparent;border:1px dashed var(--accent);color:var(--accent);border-radius:8px;padding:8px;width:100%;font-size:12px;margin-top:6px;}
.del-btn{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;width:34px;height:38px;font-size:16px;flex-shrink:0;}
.more-btn{background:transparent;border:1px dashed var(--muted);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.month-nav button{background:var(--card);color:var(--text);padding:10px 18px;border-radius:10px;border:1px solid var(--cardb);font-size:20px;line-height:1;}
.month-name{flex:1;text-align:center;font-weight:700;font-size:20px;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--card);border:1px solid var(--cardb);border-radius:18px;padding:28px 24px;width:100%;max-width:400px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.form-error{color:var(--red);font-size:13px;margin-top:8px;text-align:center;}
.auth-switch{text-align:center;margin-top:16px;font-size:14px;color:var(--dim);}
.auth-switch a{color:var(--accent);cursor:pointer;font-weight:600;}

/* SETUP */
.setup-wrap{min-height:100vh;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:500px;margin:0 auto;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.step-dot.active{background:var(--accent);}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--cardb);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}

/* CHART */
.bar-chart{height:90px;display:flex;align-items:flex-end;gap:4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:4px 4px 0 0;}
.bar-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = 'https://ldpkhtztfxqtiqfqoldx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkcGtodHp0ZnhxdGlxZnFvbGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ5NTksImV4cCI6MjA5Mjg0MDk1OX0.XzJn43hUQ3g1omcLsRagnGdxJVjIVBpDPyghpjv8DV0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DEFAULT_CATS = {
  casa:['Mutuo/Affitto','Telefono','Elettricità','Gas','Acqua','Manutenzione','Internet'],
  abbonamenti:['Netflix','Google One','Spotify','iCloud'],
  trasporti:['Assicurazione','Benzina','Manutenzione auto'],
  assicurazione:['Casa','Salute','Vita'],
  cibo:['Spesa','Pranzi/Cene fuori'],
  curaPers:['Visite','Medicine','Prodotti','Vestiti','Palestra'],
  investimenti:['Trade Republic','IsyBank','Revolut'],
};
const CAT_LABELS = {
  casa:'🏠 Casa', abbonamenti:'📱 Abbonamenti', trasporti:'🚗 Trasporti',
  assicurazione:'🛡️ Assicurazioni', cibo:'🍽️ Cibo', curaPers:'💊 Cura Personale',
  investimenti:'📈 Investimenti'
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = {
  view: 'loading',
  authMode: 'login',
  user: null,
  profile: null,
  tab: 'mese',
  meseKey: (function(){ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); })(),
  allMesi: {},
  loading: false,
  error: '',
  setupStep: 1,
  setup: { membri:[''], conti:[{nome:'Revolut',colore:'#60a5fa',principale:true},{nome:'Trade Republic',colore:'#fbbf24',principale:false},{nome:'IsyBank',colore:'#a78bfa',principale:false}] },
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = function(n){ return (parseFloat(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; };
const fmtSign = function(n){ var v=parseFloat(n)||0; return (v>=0?'+':'')+v.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; };
const el = function(id){ return document.getElementById(id); };
const h = function(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };

function getMeseData(key) {
  if (!S.allMesi[key]) {
    var spese = {};
    var cats = (S.profile && S.profile.categorie) ? S.profile.categorie : DEFAULT_CATS;
    Object.keys(cats).forEach(function(cat){ spese[cat]={}; (cats[cat]||[]).forEach(function(v){ spese[cat][v]=''; }); });
    var membri = S.profile ? (S.profile.membri||[]) : [];
    membri.forEach(function(m){ if(!spese[m]) spese[m]={}; });
    S.allMesi[key] = { conti:{}, spese:{}, viaggi:[], note:'' };
    S.allMesi[key].spese = spese;
  }
  return S.allMesi[key];
}

function calcPatrimonio(md) {
  if (!S.profile) return 0;
  var conti = S.profile.conti || [];
  var cp = conti.find(function(c){ return c.principale; }) || conti[0];
  if (!cp) return 0;
  var membri = S.profile.membri || [];
  var inizio = parseFloat(md.conti[cp.nome+'__inizio']) || 0;
  var stipendi = membri.reduce(function(s,m){ return s+(parseFloat(md.conti[cp.nome+'__stip__'+m])||0); }, 0);
  var prelevati = membri.reduce(function(s,m){ return s+(parseFloat(md.conti[cp.nome+'__prel__'+m])||0); }, 0);
  var speseTot = calcSpese(md);
  var saldoCP = inizio + stipendi - prelevati - speseTot;
  var altriConti = conti.filter(function(c){ return !c.principale; }).reduce(function(s,c){ return s+(parseFloat(md.conti[c.nome])||0); }, 0);
  return { saldoCP:saldoCP, altriConti:altriConti, tot:saldoCP+altriConti, stipendi:stipendi, prelevati:prelevati, speseTot:speseTot };
}

function calcSpese(md) {
  var tot = 0;
  Object.keys(md.spese||{}).forEach(function(cat){
    Object.keys(md.spese[cat]||{}).forEach(function(v){ tot += parseFloat(md.spese[cat][v])||0; });
  });
  (md.viaggi||[]).forEach(function(v){ tot += parseFloat(v.costo)||0; });
  return tot;
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function loadProfile() {
  var res = await sb.from('profiles').select('*').eq('id', S.user.id).maybeSingle();
  if (!res.data || !res.data.membri || res.data.membri.length === 0) {
    S.view='setup'; S.setupStep=1; render(); return;
  }
  S.profile = res.data;
  await loadAllMesi();
  S.view='app'; render();
}

async function loadAllMesi() {
  var res = await sb.from('mesi').select('*').eq('user_id', S.user.id);
  S.allMesi = {};
  (res.data||[]).forEach(function(r){ S.allMesi[r.mese_key] = r.dati; });
}

var saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async function(){
    var status = el('save-status');
    if (status) status.textContent = 'Salvataggio...';
    await sb.from('mesi').upsert({ user_id:S.user.id, mese_key:S.meseKey, dati:S.allMesi[S.meseKey], updated_at:new Date().toISOString() }, { onConflict:'user_id,mese_key' });
    if (status) { status.textContent = 'Salvato ✓'; setTimeout(function(){ if(status) status.textContent='Dati salvati nel cloud ☁️'; },2000); }
  }, 800);
}

async function saveProfileData(data) {
  await sb.from('profiles').upsert(Object.assign({ id: S.user.id }, data));
  S.profile = Object.assign({}, S.profile, data);
}

// ── LIVE UPDATE (no re-render) ─────────────────────────────────────────────
function liveUpdate() {
  var md = getMeseData(S.meseKey);
  var p = calcPatrimonio(md);
  if (!p) return;
  var set = function(id, val, color) {
    var node = el(id);
    if (node) { node.textContent = val; if(color) node.style.color = color; }
  };
  set('live-spese', fmt(p.speseTot));
  set('live-patrimonio', fmt(p.tot), p.tot>=0?'var(--accent)':'var(--red)');
  set('live-saldo-cp', fmt(p.saldoCP), p.saldoCP>=0?'var(--accent)':'var(--red)');
  set('live-stipendi', '+ '+fmt(p.stipendi));
  set('live-prelevati', '- '+fmt(p.prelevati));
  set('live-spese-det', '- '+fmt(p.speseTot));
  set('live-pat-bottom', fmt(p.tot));
}

// ── MUTATORS ──────────────────────────────────────────────────────────────────
function setContoVal(key, val) {
  var md = getMeseData(S.meseKey);
  md.conti[key] = val;
  liveUpdate(); scheduleSave();
}
function setSpesa(cat, voce, val) {
  var md = getMeseData(S.meseKey);
  if (!md.spese[cat]) md.spese[cat] = {};
  md.spese[cat][voce] = val;
  liveUpdate(); scheduleSave();
}
function addVoce(cat) {
  var md = getMeseData(S.meseKey);
  if (!md.spese[cat]) md.spese[cat] = {};
  var n = 'Voce '+(Object.keys(md.spese[cat]).length+1);
  md.spese[cat][n] = '';
  render();
}
function addViaggio() { getMeseData(S.meseKey).viaggi.push({nome:'',costo:''}); render(); }
function rmViaggio(i) { getMeseData(S.meseKey).viaggi.splice(i,1); liveUpdate(); scheduleSave(); render(); }
function setViaggio(i, field, val) { getMeseData(S.meseKey).viaggi[i][field]=val; liveUpdate(); scheduleSave(); }
function setNote(val) { getMeseData(S.meseKey).note=val; scheduleSave(); }

function prevMese() {
  var parts = S.meseKey.split('-'); var y=parseInt(parts[0]),m=parseInt(parts[1]);
  var d = new Date(y,m-2); S.meseKey=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); render();
}
function nextMese() {
  var parts = S.meseKey.split('-'); var y=parseInt(parts[0]),m=parseInt(parts[1]);
  var d = new Date(y,m); S.meseKey=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); render();
}

async function doLogout() {
  await sb.auth.signOut();
  S.user=null; S.profile=null; S.allMesi={}; S.view='auth'; S.authMode='login'; S.error=''; render();
}

// ── RENDER AUTH ───────────────────────────────────────────────────────────────
function renderAuth() {
  var isLogin = S.authMode==='login';
  el('root').innerHTML = '<div class="auth-wrap fade">'
    +'<div class="auth-card">'
    +'<div style="text-align:center;margin-bottom:24px">'
    +'<div style="width:72px;height:72px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 12px;box-shadow:0 0 24px var(--accentg)">💰</div>'
    +'<div style="font-weight:700;font-size:24px">Finance OS</div>'
    +'<div style="font-size:14px;color:var(--dim);margin-top:4px">'+(isLogin?'Accedi al tuo account':'Crea il tuo account')+'</div>'
    +'</div>'
    +'<div class="form-group"><label class="form-label">Email</label><input type="email" id="auth-email" placeholder="la-tua@email.com"></div>'
    +'<div class="form-group"><label class="form-label">Password</label><input type="password" id="auth-pass" placeholder="••••••••"></div>'
    +(S.error?'<div class="form-error">'+h(S.error)+'</div>':'')
    +'<button class="btn btn-primary" style="margin-top:8px" onclick="doAuth()">'+(S.loading?'...':isLogin?'Accedi':'Registrati')+'</button>'
    +'<div class="auth-switch">'+(isLogin?'Non hai un account? <a onclick="switchAuth(\'register\')">Registrati</a>':'Hai già un account? <a onclick="switchAuth(\'login\')">Accedi</a>')+'</div>'
    +'</div></div>';
}

function switchAuth(mode) { S.authMode=mode; S.error=''; renderAuth(); }

async function doAuth() {
  var email = el('auth-email').value.trim();
  var pass = el('auth-pass').value;
  if (!email||!pass) { S.error='Inserisci email e password'; renderAuth(); return; }
  S.loading=true; S.error=''; renderAuth();
  var res = S.authMode==='login'
    ? await sb.auth.signInWithPassword({email:email,password:pass})
    : await sb.auth.signUp({email:email,password:pass});
  S.loading=false;
  if (res.error) { S.error=res.error.message; renderAuth(); return; }
  S.user = res.data.user;
  await loadProfile();
}

// ── RENDER SETUP ──────────────────────────────────────────────────────────────
function renderSetup() {
  var s = S.setup;
  var step = S.setupStep;
  var html = '<div class="setup-wrap fade">'
    +'<div style="text-align:center">'
    +'<div style="width:64px;height:64px;background:linear-gradient(135deg,var(--accent),#00b8d4);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 0 18px var(--accentg)">💰</div>'
    +'<div style="font-weight:700;font-size:20px">Configura il profilo</div>'
    +'<div style="font-size:13px;color:var(--dim);margin-top:4px">Step '+step+' di 2</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +'<div class="step-dot'+(step>=1?' active':'')+'"></div>'
    +'<div class="step-dot'+(step>=2?' active':'')+'"></div>'
    +'</div>';

  if (step===1) {
    html += '<div class="card"><div class="card-title">👥 Chi usa questo account?</div>'
      +'<div style="font-size:13px;color:var(--dim);margin-bottom:14px">Inserisci i nomi delle persone</div>';
    s.membri.forEach(function(m,i){
      html += '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'
        +'<input value="'+h(m)+'" placeholder="Es: Andrea" id="membro-'+i+'" onblur="updateMembro('+i+',this.value)" style="flex:1">'
        +(s.membri.length>1?'<button class="del-btn" onclick="removeMembro('+i+')">×</button>':'')
        +'</div>';
    });
    html += '<button class="add-btn" onclick="addMembro()">+ Aggiungi persona</button></div>';
    html += '<button class="btn btn-primary" onclick="setupNext()">Continua →</button>';
  } else {
    html += '<div class="card"><div class="card-title">🏦 I tuoi conti</div>'
      +'<div style="font-size:12px;color:var(--dim);margin-bottom:12px">⭐ = conto principale (saldo calcolato automaticamente)</div>';
    s.conti.forEach(function(c,i){
      html += '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'
        +'<button onclick="setPrincipale('+i+')" style="background:transparent;font-size:22px;padding:0;width:30px;flex-shrink:0;border:none">'+(c.principale?'⭐':'☆')+'</button>'
        +'<input type="color" value="'+c.colore+'" onchange="updateConto('+i+',\'colore\',this.value)" style="width:36px;height:36px;padding:3px;border-radius:8px;cursor:pointer;flex-shrink:0;border:1px solid var(--cardb)">'
        +'<input value="'+h(c.nome)+'" placeholder="Nome conto" id="conto-'+i+'" onblur="updateConto('+i+',\'nome\',this.value)" style="flex:1">'
        +(s.conti.length>1?'<button class="del-btn" onclick="removeConto('+i+')">×</button>':'')
        +'</div>';
    });
    html += '<button class="add-btn" onclick="addConto()">+ Aggiungi conto</button></div>';
    if (S.error) html += '<div class="form-error">'+h(S.error)+'</div>';
    html += '<button class="btn btn-primary" onclick="setupSave()">'+(S.loading?'Salvataggio...':'Inizia! 🚀')+'</button>';
    html += '<button class="btn btn-secondary" style="margin-top:8px" onclick="S.setupStep=1;renderSetup()">← Indietro</button>';
  }
  html += '<button onclick="doLogout()" style="background:transparent;color:var(--muted);font-size:13px;text-align:center;padding:8px;border:none">Esci</button>';
  html += '</div>';
  el('root').innerHTML = html;
}

function updateMembro(i,v){ S.setup.membri[i]=v; }
function addMembro(){ S.setup.membri.push(''); renderSetup(); }
function removeMembro(i){ S.setup.membri.splice(i,1); renderSetup(); }
function updateConto(i,field,v){ S.setup.conti[i][field]=v; if(field==='colore') renderSetup(); }
function setPrincipale(i){ S.setup.conti.forEach(function(c,idx){ c.principale=idx===i; }); renderSetup(); }
function addConto(){ S.setup.conti.push({nome:'',colore:'#8892aa',principale:false}); renderSetup(); }
function removeConto(i){ S.setup.conti.splice(i,1); renderSetup(); }

function setupNext() {
  var membri = S.setup.membri.filter(function(m){ return m.trim(); });
  if (!membri.length) { alert('Inserisci almeno un nome'); return; }
  S.setup.membri = membri;
  S.setupStep=2; renderSetup();
}

async function setupSave() {
  var conti = S.setup.conti.filter(function(c){ return c.nome.trim(); });
  if (!conti.length) { S.error='Inserisci almeno un conto'; renderSetup(); return; }
  if (!conti.some(function(c){ return c.principale; })) conti[0].principale=true;
  S.loading=true; S.error=''; renderSetup();
  var cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
  S.setup.membri.forEach(function(m){ cats[m]=[]; });
  await saveProfileData({ membri:S.setup.membri, conti:conti, categorie:cats });
  S.loading=false;
  await loadAllMesi();
  S.view='app'; render();
}

// ── RENDER APP ────────────────────────────────────────────────────────────────
function render() {
  if (S.view==='loading') { el('root').innerHTML='<div class="loading"><div class="spinner"></div><div style="color:var(--dim);font-size:14px">Caricamento...</div></div>'; return; }
  if (S.view==='auth') { renderAuth(); return; }
  if (S.view==='setup') { renderSetup(); return; }
  if (S.view==='app') { renderApp(); return; }
}

function renderApp() {
  var p = S.profile;
  var nomi = (p.membri||[]).join(' & ');
  var tabHtml = S.tab==='mese' ? renderMese() : renderStorico();
  el('root').innerHTML = '<div id="app">'
    +'<div id="header"><div class="header-inner">'
    +'<div class="logo"><div class="logo-icon">💰</div><div><div class="logo-text">Finance OS</div><div class="logo-sub">'+h(nomi)+'</div></div></div>'
    +'<button onclick="doLogout()" style="background:transparent;color:var(--muted);font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--cardb)">Esci</button>'
    +'</div></div>'
    +'<div id="content">'+tabHtml+'</div>'
    +'<div id="nav">'
    +'<button class="nav-btn'+(S.tab==='mese'?' active':'')+'" onclick="switchTab(\'mese\')"><span class="nav-icon">📅</span><span class="nav-label">MESE</span></button>'
    +'<button class="nav-btn'+(S.tab==='storico'?' active':'')+'" onclick="switchTab(\'storico\')"><span class="nav-icon">📊</span><span class="nav-label">STORICO</span></button>'
    +'</div>'
    +'</div>';
}

function switchTab(tab) { S.tab=tab; renderApp(); }

// ── RENDER MESE ───────────────────────────────────────────────────────────────
function renderMese() {
  var parts = S.meseKey.split('-');
  var nomeMese = MESI[parseInt(parts[1])-1]+' '+parts[0];
  var md = getMeseData(S.meseKey);
  var p = S.profile;
  var conti = p.conti||[];
  var membri = p.membri||[];
  var cp = conti.find(function(c){ return c.principale; })||conti[0];
  var calc = calcPatrimonio(md);
  var cats = p.categorie || DEFAULT_CATS;

  var html = '<div class="fade">';

  // Month nav
  html += '<div class="month-nav">'
    +'<button onclick="prevMese()">‹</button>'
    +'<div class="month-name">'+nomeMese+'</div>'
    +'<button onclick="nextMese()">›</button>'
    +'</div>';

  // Stat boxes
  html += '<div class="stat-row">'
    +'<div class="stat"><div class="stat-label">Spese Totali</div><div class="stat-value" style="color:var(--red)" id="live-spese">'+fmt(calc.speseTot)+'</div></div>'
    +'<div class="stat"><div class="stat-label">💎 Patrimonio</div><div class="stat-value" id="live-patrimonio" style="color:'+(calc.tot>=0?'var(--accent)':'var(--red)')+'">'+fmt(calc.tot)+'</div></div>'
    +'</div>';

  // Conto principale
  if (cp) {
    html += '<div class="card glow">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+cp.colore+'"></div>'
      +'<div class="card-title" style="margin-bottom:0">⭐ '+h(cp.nome)+'</div>'
      +'</div>'
      // Cifra iniziale
      +'<div class="row"><div class="row-label">💰 Cifra inizio mese</div>'
      +'<input type="number" value="'+(md.conti[cp.nome+'__inizio']||'')+'" placeholder="0" oninput="setContoVal(\''+cp.nome+'__inizio\',this.value)"></div>';

    // Stipendi per membro
    membri.forEach(function(m){
      var k = cp.nome+'__stip__'+m;
      html += '<div class="row"><div class="row-label">💼 Stipendio '+h(m)+'</div>'
        +'<input type="number" value="'+(md.conti[k]||'')+'" placeholder="0" oninput="setContoVal(\''+k+'\',this.value)"></div>';
    });

    // Prelevati per membro
    membri.forEach(function(m){
      var k = cp.nome+'__prel__'+m;
      html += '<div class="row"><div class="row-label">💸 Prelevati '+h(m)+'</div>'
        +'<input type="number" value="'+(md.conti[k]||'')+'" placeholder="0" oninput="setContoVal(\''+k+'\',this.value)"></div>';
    });

    // Riepilogo calcolo
    html += '<div class="divider"></div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--dim)">Stipendi</span><span class="mono" style="font-size:13px;color:var(--accent)" id="live-stipendi">+ '+fmt(calc.stipendi)+'</span></div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--dim)">Prelevati</span><span class="mono" style="font-size:13px;color:var(--gold)" id="live-prelevati">- '+fmt(calc.prelevati)+'</span></div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--dim)">Spese totali</span><span class="mono" style="font-size:13px;color:var(--red)" id="live-spese-det">- '+fmt(calc.speseTot)+'</span></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--accent)">'
      +'<span style="font-weight:700">💰 Saldo '+h(cp.nome)+'</span>'
      +'<span class="mono" style="font-size:18px;font-weight:700;color:'+(calc.saldoCP>=0?'var(--accent)':'var(--red)')+'" id="live-saldo-cp">'+fmt(calc.saldoCP)+'</span>'
      +'</div></div>';
  }

  // Altri conti
  var altriConti = conti.filter(function(c){ return !c.principale; });
  if (altriConti.length) {
    html += '<div class="card"><div class="card-title">🏦 Altri Conti</div>';
    altriConti.forEach(function(c){
      html += '<div style="display:grid;grid-template-columns:auto 1fr 105px;gap:8px;margin-bottom:10px;align-items:center">'
        +'<div style="width:10px;height:10px;border-radius:50%;background:'+c.colore+'"></div>'
        +'<div style="font-size:13px;color:var(--dim)">'+h(c.nome)+'</div>'
        +'<input type="number" value="'+(md.conti[c.nome]||'')+'" placeholder="0" oninput="setContoVal(\''+c.nome+'\',this.value)">'
        +'</div>';
    });
    html += '<div class="divider"></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-weight:700;font-size:15px">💎 Patrimonio Totale</span>'
      +'<span class="mono" style="font-size:18px;font-weight:700;color:var(--accent)" id="live-pat-bottom">'+fmt(calc.tot)+'</span>'
      +'</div></div>';
  }

  // Categorie spese
  Object.keys(cats).forEach(function(cat){
    if (membri.indexOf(cat)>=0) return; // skip personali qui
    var label = CAT_LABELS[cat]||('📌 '+cat);
    var voci = Object.keys(md.spese[cat]||{}).length > (cats[cat]||[]).length
      ? Object.keys(md.spese[cat])
      : (cats[cat]||[]);
    var tot = voci.reduce(function(s,v){ return s+(parseFloat((md.spese[cat]||{})[v])||0); },0);
    html += '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div class="card-title" style="margin-bottom:0">'+label+'</div>'
      +'<div class="mono" style="font-size:12px;color:'+(tot>0?'var(--gold)':'var(--muted)')+'">'+fmt(tot)+'</div>'
      +'</div>';
    voci.forEach(function(v){
      html += '<div class="row"><div class="row-label">'+h(v)+'</div>'
        +'<input type="number" value="'+((md.spese[cat]||{})[v]||'')+'" placeholder="0" oninput="setSpesa(\''+cat+'\',\''+v+'\',this.value)">'
        +'</div>';
    });
    html += '<div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="more-btn" onclick="addVoce(\''+cat+'\')">+ voce</button></div>';
    html += '</div>';
  });

  // Spese personali per membro
  membri.forEach(function(membro){
    var voci = Object.keys((md.spese[membro])||{});
    var tot = voci.reduce(function(s,v){ return s+(parseFloat((md.spese[membro]||{})[v])||0); },0);
    html += '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div class="card-title" style="margin-bottom:0">👤 '+h(membro)+' — Personale</div>'
      +'<div class="mono" style="font-size:12px;color:'+(tot>0?'var(--gold)':'var(--muted)')+'">'+fmt(tot)+'</div>'
      +'</div>';
    voci.forEach(function(v){
      html += '<div class="row"><div class="row-label">'+h(v)+'</div>'
        +'<input type="number" value="'+((md.spese[membro]||{})[v]||'')+'" placeholder="0" oninput="setSpesa(\''+membro+'\',\''+v+'\',this.value)">'
        +'</div>';
    });
    html += '<div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="more-btn" onclick="addVoce(\''+membro+'\')">+ voce</button></div>';
    html += '</div>';
  });

  // Viaggi
  var totV = (md.viaggi||[]).reduce(function(s,v){ return s+(parseFloat(v.costo)||0); },0);
  html += '<div class="card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div class="card-title" style="margin-bottom:0">✈️ Viaggi</div>'
    +'<div class="mono" style="font-size:12px;color:'+(totV>0?'var(--gold)':'var(--muted)')+'">'+fmt(totV)+'</div>'
    +'</div>';
  (md.viaggi||[]).forEach(function(v,i){
    html += '<div style="display:grid;grid-template-columns:1fr 95px 34px;gap:6px;margin-bottom:6px;align-items:center">'
      +'<input value="'+h(v.nome||'')+'" placeholder="Destinazione" onblur="setViaggio('+i+',\'nome\',this.value)" style="text-align:left">'
      +'<input type="number" value="'+(v.costo||'')+'" placeholder="0" oninput="setViaggio('+i+',\'costo\',this.value)">'
      +'<button class="del-btn" onclick="rmViaggio('+i+')">×</button>'
      +'</div>';
  });
  html += '<button class="add-btn" onclick="addViaggio()">+ Aggiungi viaggio</button></div>';

  // Note
  html += '<div class="card"><div class="card-title">📝 Note</div>'
    +'<textarea rows="3" placeholder="Annotazioni..." onblur="setNote(this.value)" style="resize:none">'+h(md.note||'')+'</textarea></div>';

  html += '<div id="save-status" style="text-align:center;color:var(--muted);font-size:12px;padding:8px 0 16px">Dati salvati nel cloud ☁️</div>';
  html += '</div>';
  return html;
}

// ── RENDER STORICO ────────────────────────────────────────────────────────────
function renderStorico() {
  var entries = Object.keys(S.allMesi).sort().reverse().map(function(k){ return [k, S.allMesi[k]]; });
  var html = '<div class="fade">';
  if (!entries.length) {
    return html+'<div style="text-align:center;padding:60px;color:var(--muted)">Nessun dato ancora.<br>Inizia dal tab Mese!</div></div>';
  }
  var chartData = entries.slice().reverse().map(function(e){
    var c = calcPatrimonio(e[1]);
    return { key:e[0], tot:c?c.tot:0 };
  });
  if (chartData.length>1) {
    var maxV = Math.max.apply(null, chartData.map(function(d){ return d.tot; }).concat([1]));
    html += '<div class="card"><div class="card-title">📊 Andamento Patrimonio</div><div class="bar-chart">';
    chartData.forEach(function(d,i){
      var hpx = Math.max((d.tot/maxV)*70, 4);
      var isLast = i===chartData.length-1;
      var parts = d.key.split('-');
      html += '<div class="bar-col">'
        +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:8px;color:var(--dim);text-align:center">'+(d.tot>0?Math.round(d.tot/1000)+'k':'')+'</div>'
        +'<div class="bar" style="height:'+hpx+'px;background:'+(isLast?'var(--accent)':'var(--accentd)')+'"></div>'
        +'<div class="bar-lbl">'+String(parts[1]).padStart(2,'0')+'/'+parts[0].slice(2)+'</div>'
        +'</div>';
    });
    html += '</div></div>';
  }
  entries.forEach(function(e){
    var key=e[0], md=e[1];
    var c = calcPatrimonio(md);
    var spese = c?c.speseTot:0;
    var pat = c?c.tot:0;
    var parts = key.split('-');
    html += '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<div style="font-weight:700;font-size:16px">'+MESI[parseInt(parts[1])-1]+' '+parts[0]+'</div>'
      +'<div class="mono" style="color:'+(pat>=0?'var(--accent)':'var(--red)')+';font-size:14px;font-weight:600">'+fmt(pat)+'</div>'
      +'</div>'
      +'<div class="stat-row">'
      +'<div class="stat"><div class="stat-label">Spese</div><div class="stat-value" style="color:var(--red)">'+fmt(spese)+'</div></div>'
      +'<div class="stat"><div class="stat-label">Patrimonio</div><div class="stat-value" style="color:var(--gold)">'+fmt(pat)+'</div></div>'
      +'</div></div>';
  });
  html += '</div>';
  return html;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  render();
  try {
    var res = await sb.auth.getSession();
    var user = res.data && res.data.session && res.data.session.user;
    if (user) {
      S.user = user;
      await loadProfile();
    } else {
      S.view='auth'; render();
    }
  } catch(e) {
    el('root').innerHTML = '<div class="loading"><div style="color:var(--red);font-size:14px;text-align:center;padding:20px">Errore di connessione:<br>'+e.message+'<br><br><button onclick="init()" style="background:var(--accent);color:#000;padding:10px 20px;border-radius:8px;border:none;font-weight:700">Riprova</button></div></div>';
  }
}

init();
</script>
</body>
</html>
